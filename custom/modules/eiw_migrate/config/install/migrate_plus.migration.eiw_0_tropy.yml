id: eiw_0_tropy
label: East India Wills migration from Tropy CSV export

migration_tags:
  - Wills
  - Tropy
  - CSV

source:
  plugin: custom_csv
  path: '/app/html/modules/custom/eiw_migrate/data/csv/eiw_tropy.csv'
  header_row_count: 1
  ids: [custom_source_id]
  
  fields:
    0:
      name: tropy_title
      label: Tropy Title
    1:
      name: creator
      label: Creator
    2:
      name: date
      label: Date
    3:
      name: type
      label: Type
    4:
      name: source
      label: Source
    5:
      name: collection
      label: Collection
    6:
      name: box
      label: Box
    7:
      name: folder
      label: Folder
    8:
      name: identifier
      label: Identifier
    9:
      name: rights
      label: Rights
    10:
      name: tags
      label: Tags
    11:
      name: path
      label: Path
    12:
      name: note
      label: Note
    13:
      name: path2
      label: Path 2
    14:
      name: note2
      label: Note 2
    15:
      name: path3
      label: Path 3
    16:
      name: note3
      label: Note 3

process:
  custom_source_id:
    plugin: concat
    source:
      - tropy_title
      - path
    delimiter: '-'
  title: 
    plugin: callback
    callable: trim
    source: eiw_title
  field_tropy_title: 
    plugin: callback
    callable: trim
    source: tropy_title
  field_pdf_name: 
    plugin: callback
    callable: trim
    source: path    
  field_first_name: 
    plugin: callback
    callable: trim
    source: first_name
  field_last_name: 
    plugin: callback
    callable: trim
    source: last_name
  field_notes: 
    plugin: callback
    callable: trim
    source: note
  field_date_of_will:
    plugin: callback
    callable: trim
    source: date_of_will
  field_date_of_probate:
    plugin: callback
    callable: trim
    source: date_of_probate
  field_reference:
    plugin: callback
    callable: trim
    source: reference
  field_ship:
    plugin: callback
    callable: trim
    source: ship_ref
  field_additional_names:
    plugin: callback
    callable: trim
    source: add_names
  field_court: court_ref
  field_role: role_ref
  field_document_images: img_ref

destination:
  plugin: entity:node
  default_bundle: eiw_will

dependencies:
  module:
    - eiw_migrate
  enforced:
    module:
    - eiw_migrate
